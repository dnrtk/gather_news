<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ニュースダイジェスト</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a1a;
      --fg-muted: #666666;
      --accent: #2563eb;
      --border: #e5e7eb;
      --badge-bg: #dbeafe;
      --badge-fg: #1d4ed8;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111827;
        --fg: #f9fafb;
        --fg-muted: #9ca3af;
        --accent: #60a5fa;
        --border: #374151;
        --badge-bg: #1e3a5f;
        --badge-fg: #93c5fd;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      padding: 1.5rem 1rem;
      max-width: 640px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    ul { list-style: none; }
    .day-entry {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid var(--border);
    }
    .day-label { color: var(--fg-muted); font-size: 0.9rem; min-width: 180px; }
    .links { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
    .links a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
    .links a:hover { text-decoration: underline; }
    .badge-weekly {
      font-size: 0.75rem;
      background: var(--badge-bg);
      color: var(--badge-fg);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>ニュースダイジェスト</h1>
  <ul>
    <li class="day-entry">
      <span class="day-label">2026年03月14日（土）</span>
      <span class="links">
      <a href="pages/2026/03/20260314_morning.html">朝刊</a>
      </span>
    </li>
  </ul>
</body>
</html>
